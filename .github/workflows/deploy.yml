name: CI/CD Deploy to OCI

on:
  push:
    branches:
      - main  # mainブランチにマージされた瞬間に自動で起動する

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # ここまでCI

      - name: Deploy to OCI VM via SSH
        uses: appleboy/ssh-action@v1.0.3 # プラグイン名/SSH接続機能/バージョン
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. OCI上のデプロイ先ディレクトリに移動（なければ作成）
            mkdir -p ~/enterprise-rag-agent
            cd ~/enterprise-rag-agent

            # 2. 最新のソースコードをリポジトリから引っ張る（初回のクローン/同期処理）
            if [ ! -d ".git" ]; then
              git clone git@github.com:${{ github.repository }}.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # 3. 本番環境でのコンテナビルド & バックグラウンド起動
            docker compose down
            docker compose up -d --build
